name: Falix Auto Start

on:
  workflow_dispatch:
  repository_dispatch:
    types: [falix-start]

jobs:
  start-server:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright-core

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Run Falix Auto Start
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
          FALIX_SERVER_ID: ${{ secrets.FALIX_SERVER_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cat > run.mjs << 'EOF'
          import { chromium } from 'playwright-core';
          import { spawn } from 'child_process';
          import http from 'http';
          import fs from 'fs';

          const EMAIL      = process.env.FALIX_EMAIL;
          const PASSWORD   = process.env.FALIX_PASSWORD;
          const SERVER_ID  = process.env.FALIX_SERVER_ID;
          const TG_TOKEN   = process.env.TG_TOKEN;
          const TG_CHAT_ID = process.env.TG_CHAT_ID;

          const LOGIN_URL  = 'https://client.falixnodes.net/auth/login';
          const SERVER_URL = `https://client.falixnodes.net/server/${SERVER_ID}/console`;
          const DEBUG_PORT = 9222;
          const CHROME_PATH = '/usr/bin/google-chrome-stable';

          // ── 工具 ─────────────────────────────────────────────────────────

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function sendTelegram(msg) {
            if (!TG_TOKEN || !TG_CHAT_ID) return;
            try {
              await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'HTML' })
              });
            } catch (e) { console.log('TG 失败:', e.message); }
          }

          // ── 检测 Chrome 调试端口（HTTP /json/version 更准确）────────────

          function checkPort(port) {
            return new Promise(resolve => {
              const req = http.get(`http://127.0.0.1:${port}/json/version`, res => resolve(true));
              req.on('error', () => resolve(false));
              req.setTimeout(1000, () => { req.destroy(); resolve(false); });
            });
          }

          // ── 启动 Chrome ───────────────────────────────────────────────────

          async function launchChrome() {
            // 如果已有实例就跳过
            if (await checkPort(DEBUG_PORT)) {
              console.log('Chrome 已在运行');
              return;
            }
            console.log(`🚀 启动 Chrome: ${CHROME_PATH}`);
            const args = [
              `--remote-debugging-port=${DEBUG_PORT}`,
              '--no-first-run',
              '--no-default-browser-check',
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--disable-dev-shm-usage',
              '--disable-gpu',
              '--window-size=1280,800',
              '--disable-blink-features=AutomationControlled',
              '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              '--lang=zh-CN,zh',
              '--user-data-dir=/tmp/chrome_falix_data'
            ];
            const proc = spawn(CHROME_PATH, args, { detached: true, stdio: 'ignore' });
            proc.unref();

            // 轮询 HTTP /json/version，最多等 30 秒
            console.log('⏳ 等待 Chrome 调试接口就绪...');
            for (let i = 0; i < 30; i++) {
              if (await checkPort(DEBUG_PORT)) {
                console.log('✅ Chrome 就绪');
                return;
              }
              await sleep(1000);
            }
            throw new Error('Chrome 启动超时，/json/version 未响应');
          }

          // ── 连接 Chrome（带重试）─────────────────────────────────────────

          async function connectChrome() {
            for (let k = 0; k < 5; k++) {
              try {
                const browser = await chromium.connectOverCDP(`http://127.0.0.1:${DEBUG_PORT}`);
                console.log('✅ CDP 连接成功');
                return browser;
              } catch (e) {
                console.log(`连接失败 (${k + 1}/5): ${e.message}`);
                await sleep(2000);
              }
            }
            throw new Error('CDP 连接失败，已重试 5 次');
          }

          // ── Turnstile 注入脚本（页面加载前执行）──────────────────────────
          // Hook attachShadow，当 Shadow DOM 创建时自动捕获 checkbox 坐标比例
          // 存入 window.__turnstile_data = { xRatio, yRatio }

          const INJECTED_SCRIPT = `
          (function() {
            if (window.self === window.top) return; // 只在 iframe 里注入

            // 模拟真实屏幕坐标（绕过 bot 检测）
            try {
              const sx = Math.floor(Math.random() * 400) + 800;
              const sy = Math.floor(Math.random() * 200) + 400;
              Object.defineProperty(MouseEvent.prototype, 'screenX', { value: sx });
              Object.defineProperty(MouseEvent.prototype, 'screenY', { value: sy });
            } catch(e) {}

            // Hook attachShadow，捕获 Turnstile checkbox 坐标
            try {
              const orig = Element.prototype.attachShadow;
              Element.prototype.attachShadow = function(init) {
                const shadow = orig.call(this, init);
                if (!shadow) return shadow;
                const check = () => {
                  const cb = shadow.querySelector('input[type="checkbox"]');
                  if (cb) {
                    const r = cb.getBoundingClientRect();
                    if (r.width > 0 && window.innerWidth > 0) {
                      window.__turnstile_data = {
                        xRatio: (r.left + r.width / 2) / window.innerWidth,
                        yRatio: (r.top + r.height / 2) / window.innerHeight
                      };
                      return true;
                    }
                  }
                  return false;
                };
                if (!check()) {
                  const obs = new MutationObserver(() => { if (check()) obs.disconnect(); });
                  obs.observe(shadow, { childList: true, subtree: true });
                }
                return shadow;
              };
            } catch(e) {}
          })();
          `;

          // ── CDP 鼠标 ──────────────────────────────────────────────────────

          async function cdpMouseMove(client, x0, y0, x1, y1, steps = 20) {
            for (let i = 0; i <= steps; i++) {
              const x = x0 + (x1 - x0) * (i / steps) + (Math.random() - 0.5) * 2;
              const y = y0 + (y1 - y0) * (i / steps) + (Math.random() - 0.5) * 2;
              await client.send('Input.dispatchMouseEvent', {
                type: 'mouseMoved', x, y, modifiers: 0, buttons: 0, button: 'none', clickCount: 0
              });
              await sleep(10 + Math.random() * 20);
            }
          }

          async function cdpClick(client, x, y) {
            await cdpMouseMove(client, x - 60 + Math.random() * 30, y + Math.random() * 10, x, y, 18);
            await sleep(60 + Math.random() * 100);
            await client.send('Input.dispatchMouseEvent', {
              type: 'mousePressed', x, y, modifiers: 0, button: 'left', buttons: 1, clickCount: 1
            });
            await sleep(80 + Math.random() * 80);
            await client.send('Input.dispatchMouseEvent', {
              type: 'mouseReleased', x, y, modifiers: 0, button: 'left', buttons: 0, clickCount: 1
            });
          }

          async function cdpType(client, page, selector, text) {
            await page.focus(selector);
            await sleep(300);
            for (const char of text) {
              await client.send('Input.dispatchKeyEvent', { type: 'keyDown', text: char });
              await sleep(40 + Math.random() * 60);
              await client.send('Input.dispatchKeyEvent', { type: 'keyUp', text: char });
              await sleep(20 + Math.random() * 40);
            }
          }

          // ── Turnstile 点击（从所有 frames 的 __turnstile_data 读坐标）────

          async function attemptTurnstileCdp(page) {
            const frames = page.frames();
            for (const frame of frames) {
              try {
                const data = await frame.evaluate(() => window.__turnstile_data).catch(() => null);
                if (!data) continue;

                console.log(`  >> Turnstile 数据: xRatio=${data.xRatio.toFixed(3)}, yRatio=${data.yRatio.toFixed(3)}`);

                const iframeEl = await frame.frameElement();
                if (!iframeEl) continue;

                const box = await iframeEl.boundingBox();
                if (!box) continue;

                const clickX = box.x + box.width  * data.xRatio;
                const clickY = box.y + box.height * data.yRatio;
                console.log(`  >> 计算点击坐标: (${clickX.toFixed(1)}, ${clickY.toFixed(1)})`);

                const client = await page.context().newCDPSession(page);
                await cdpClick(client, clickX, clickY);
                await client.detach();
                return true;
              } catch (e) { /* 继续下一个 frame */ }
            }
            return false;
          }

          // ── 等待 Turnstile token 生成（检测隐藏 input）───────────────────

          async function waitTurnstileToken(page, timeoutMs = 20000) {
            const end = Date.now() + timeoutMs;
            while (Date.now() < end) {
              // 检查 cf-turnstile-response hidden input
              const ok = await page.evaluate(() => {
                const inputs = document.querySelectorAll(
                  'input[name="cf-turnstile-response"], textarea[name="cf-turnstile-response"]'
                );
                return [...inputs].some(i => i.value && i.value.length > 10);
              }).catch(() => false);
              if (ok) return true;

              // 也检查 Turnstile iframe 里的 Success 文字
              for (const frame of page.frames()) {
                if (!frame.url().includes('cloudflare')) continue;
                try {
                  const visible = await frame.getByText('Success!', { exact: false })
                    .isVisible({ timeout: 300 }).catch(() => false);
                  if (visible) return true;
                } catch {}
              }

              await sleep(600);
            }
            return false;
          }

          // ── 状态检测 ──────────────────────────────────────────────────────

          async function getServerStatus(page) {
            return page.evaluate(() => {
              function walkText(root) {
                const iter = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
                let node;
                while ((node = iter.nextNode())) {
                  const t = node.textContent.trim().toLowerCase();
                  if (t === 'offline')  return 'offline';
                  if (t === 'starting') return 'starting';
                  if (t === 'online' || t === 'running') return 'online';
                }
                return null;
              }
              for (const sel of ['.server-status', '[class*="status"]', '[class*="badge"]', '.badge']) {
                for (const el of document.querySelectorAll(sel)) {
                  const r = walkText(el);
                  if (r) return r;
                }
              }
              return walkText(document.body) || 'unknown';
            });
          }

          // ── 广告弹窗 ──────────────────────────────────────────────────────

          async function dismissAd(page) {
            try {
              const btns = await page.$$('button');
              for (const btn of btns) {
                const txt = (await btn.textContent())?.trim().toLowerCase();
                if (txt === 'cancel') {
                  console.log('  🚫 关闭广告弹窗');
                  await btn.click();
                  await sleep(1000);
                  return true;
                }
              }
            } catch {}
            return false;
          }

          // ── 点击 Start ────────────────────────────────────────────────────

          async function clickStart(page, client) {
            await dismissAd(page);
            const btns = await page.$$('button');
            for (const btn of btns) {
              const txt = (await btn.textContent())?.trim().toLowerCase();
              if (txt === 'start') {
                const box = await btn.boundingBox();
                if (box) {
                  console.log('  ▶️  点击 Start');
                  await cdpClick(client, box.x + box.width / 2, box.y + box.height / 2);
                  await sleep(2000);
                  await dismissAd(page);
                  return true;
                }
              }
            }
            console.log('  ⚠️  未找到 Start 按钮');
            return false;
          }

          // ── 主流程 ────────────────────────────────────────────────────────

          async function main() {
            await launchChrome();
            const browser = await connectChrome();
            const context = browser.contexts()[0];
            const page    = context.pages()[0] || await context.newPage();

            // 注入 Turnstile Hook 脚本（每次导航前执行）
            await page.addInitScript(INJECTED_SCRIPT);

            const client = await page.context().newCDPSession(page);

            try {
              // ── 登录 ──────────────────────────────────────────────────────
              console.log('📋 打开登录页...');
              await page.goto(LOGIN_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(2500);

              console.log('✏️  填写邮箱...');
              await cdpType(client, page,
                'input[name="email"], input[type="email"], input[placeholder*="email" i]', EMAIL);
              await sleep(400 + Math.random() * 300);

              console.log('✏️  填写密码...');
              await cdpType(client, page,
                'input[name="password"], input[type="password"]', PASSWORD);
              await sleep(400 + Math.random() * 300);

              // Turnstile：最多尝试 15 次，每次间隔 1 秒
              console.log('🤖 处理 Cloudflare Turnstile...');
              let turnstileOk = false;
              for (let i = 0; i < 15; i++) {
                const clicked = await attemptTurnstileCdp(page);
                if (clicked) {
                  console.log('  >> CDP 点击已发送，等待 token...');
                  turnstileOk = await waitTurnstileToken(page, 10000);
                  if (turnstileOk) { console.log('  ✅ Turnstile 通过'); break; }
                } else {
                  console.log(`  >> 等待 Turnstile 加载 (${i + 1}/15)...`);
                }
                await sleep(1000);
              }
              if (!turnstileOk) console.log('⚠️  Turnstile 未明确通过，继续提交...');

              await sleep(500);
              console.log('🔑 提交登录...');
              const loginBtn = await page.$('button[type="submit"]');
              if (loginBtn) {
                const box = await loginBtn.boundingBox();
                if (box) await cdpClick(client, box.x + box.width / 2, box.y + box.height / 2);
              } else {
                await page.keyboard.press('Enter');
              }

              try {
                await page.waitForNavigation({ timeout: 20000, waitUntil: 'domcontentloaded' });
              } catch { await sleep(5000); }

              const afterUrl = page.url();
              console.log('当前 URL:', afterUrl);
              if (afterUrl.includes('/auth/login')) {
                await page.screenshot({ path: '/tmp/login_fail.png' });
                await sendTelegram('❌ <b>Falix</b> 登录失败，请检查账号密码或 Turnstile');
                process.exit(1);
              }
              console.log('✅ 登录成功！');

              // ── 跳转控制台 ─────────────────────────────────────────────────
              console.log(`🖥️  跳转: ${SERVER_URL}`);
              await page.goto(SERVER_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(3000);

              // ── 检测 & 操作 ────────────────────────────────────────────────
              const status = await getServerStatus(page);
              console.log(`📊 当前状态: ${status}`);

              if (status === 'starting' || status === 'online') {
                console.log('✅ 服务器运行中，无需操作。');
                await sendTelegram(`✅ <b>Falix</b> 状态 <code>${status}</code>，无需操作。`);
                process.exit(0);
              }

              console.log('🔴 Offline，开始启动...');
              await clickStart(page, client);

              console.log('⏳ 等待 15 秒...');
              await sleep(15000);
              await page.reload({ waitUntil: 'domcontentloaded', timeout: 20000 });
              await sleep(2000);

              const status2 = await getServerStatus(page);
              console.log(`📊 15 秒后: ${status2}`);

              if (status2 === 'starting' || status2 === 'online') {
                await page.screenshot({ path: '/tmp/ok.png' });
                await sendTelegram(`✅ <b>Falix</b> 启动成功，状态: <code>${status2}</code>`);
                console.log('✅ 启动成功！');
              } else {
                console.log('⚠️  状态未变，再次点击 Start...');
                await clickStart(page, client);
                await sleep(8000);
                await page.reload({ waitUntil: 'domcontentloaded', timeout: 20000 });
                await sleep(2000);
                const status3 = await getServerStatus(page);
                console.log(`📊 最终状态: ${status3}`);
                await page.screenshot({ path: '/tmp/final.png' });
                if (status3 === 'starting' || status3 === 'online') {
                  await sendTelegram(`✅ <b>Falix</b> 二次启动成功，状态: <code>${status3}</code>`);
                } else {
                  await sendTelegram(`⚠️ <b>Falix</b> 两次启动后状态仍为 <code>${status3}</code>，请手动检查`);
                }
              }

            } catch (err) {
              console.error('❌ 出错:', err.message);
              try { await page.screenshot({ path: '/tmp/error.png' }); } catch {}
              await sendTelegram(`❌ <b>Falix</b> 工作流出错: ${err.message}`);
              process.exit(1);
            } finally {
              await browser.close().catch(() => {});
            }
          }

          main();
          EOF
          node run.mjs
