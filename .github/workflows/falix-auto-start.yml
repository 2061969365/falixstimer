name: Falix Auto Start

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [falix-start]

jobs:
  start-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y xvfb

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq && sudo apt-get install -y google-chrome-stable
          google-chrome-stable --version

      - name: Install Node dependencies
        run: npm init -y && npm install puppeteer-real-browser puppeteer-core

      - name: Write script
        run: |
          python3 - << 'PYEOF'
          script = r"""
          import { connect } from 'puppeteer-real-browser';
          import fs from 'fs';

          const EMAIL     = process.env.FALIX_EMAIL;
          const PASSWORD  = process.env.FALIX_PASSWORD;
          const SERVER_ID = process.env.FALIX_SERVER_ID;
          const TG_TOKEN  = process.env.TG_TOKEN;
          const TG_CHAT_ID= process.env.TG_CHAT_ID;
          const LOGIN_URL = 'https://client.falixnodes.net/auth/login';
          const SERVER_URL= `https://client.falixnodes.net/server/${SERVER_ID}/console`;
          const TIMER_URL = `https://client.falixnodes.net/timer?id=${SERVER_ID}`;

          const sleep = ms => new Promise(r => setTimeout(r, ms));
          fs.mkdirSync('/tmp/ss', { recursive: true });

async function shot(page, name) {
  try { await page.screenshot({ path: `/tmp/ss/${name}.png`, fullPage: true, timeout: 15000 }); console.log('shot:' + name); }
  catch(e) { console.log('shot fail ' + name + ': ' + e.message); }
}

          async function tg(msg) {
            if (!TG_TOKEN || !TG_CHAT_ID) return;
            try {
              await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode:'HTML' })
              });
            } catch {}
          }

          async function cdpClick(page, x, y) {
            const s = await page.target().createCDPSession();
            try {
              await s.send('Input.dispatchMouseEvent', { type:'mouseMoved', x, y, button:'none', buttons:0, modifiers:0, clickCount:0 });
              await sleep(60);
              await s.send('Input.dispatchMouseEvent', { type:'mousePressed', x, y, button:'left', buttons:1, modifiers:0, clickCount:1 });
              await sleep(80);
              await s.send('Input.dispatchMouseEvent', { type:'mouseReleased', x, y, button:'left', buttons:0, modifiers:0, clickCount:1 });
            } finally { await s.detach().catch(()=>{}); }
          }

          async function btnPos(page, label) {
            return page.evaluate(lbl => {
              const b = [...document.querySelectorAll('button')]
                .find(b => b.textContent?.trim().toLowerCase() === lbl);
              if (!b) return null;
              const r = b.getBoundingClientRect();
              return r.width > 0 ? { x: r.left + r.width/2, y: r.top + r.height/2 } : null;
            }, label);
          }

          async function clickTurnstile(page) {
            for (let i = 0; i < 20; i++) {
              const p = await page.evaluate(() => {
                for (const s of ['cf-turnstile','[data-sitekey]','.cf-turnstile','iframe[src*="challenges.cloudflare.com"]']) {
                  const el = document.querySelector(s);
                  if (el) { const r = el.getBoundingClientRect(); if (r.width>0) return { x: r.left+24, y: r.top+r.height/2 }; }
                }
                return null;
              });
              if (p) { console.log('Turnstile @ ' + (p.x|0) + ',' + (p.y|0)); await cdpClick(page, p.x, p.y); return true; }
              await sleep(1000);
            }
            return false;
          }

          async function waitTurnstile(page) {
            const end = Date.now() + 15000;
            while (Date.now() < end) {
              const ok = await page.evaluate(() =>
                [...document.querySelectorAll('input[name="cf-turnstile-response"],textarea[name="cf-turnstile-response"]')]
                  .some(i => i.value && i.value.length > 10)
              ).catch(()=>false);
              if (ok) return true;
              for (const f of page.frames()) {
                if (!f.url().includes('cloudflare')) continue;
                const t = await f.evaluate(()=>document.body?.innerText||'').catch(()=>'');
                if (t.includes('Success')) return true;
              }
              await sleep(500);
            }
            return false;
          }

          async function getStatus(page) {
            return page.evaluate(() => {
              function w(root) {
                const it = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
                let n;
                while ((n = it.nextNode())) {
                  const t = n.textContent.trim().toLowerCase();
                  if (t==='offline') return 'offline';
                  if (t==='starting') return 'starting';
                  if (t==='online'||t==='running') return 'online';
                }
                return null;
              }
              for (const s of ['.server-status','[class*="status"]','[class*="badge"]','.badge'])
                for (const el of document.querySelectorAll(s)) { const r=w(el); if(r) return r; }
              return w(document.body) || 'unknown';
            });
          }

          async function getRemainingTime(page) {
            return page.evaluate(() => {
              const t = document.body.innerText;
              const hms = t.match(/(\d+):(\d{2}):(\d{2})/);
              if (hms) return +hms[1]*3600 + +hms[2]*60 + +hms[3];
              const h = t.match(/(\d+)\s*h(?:ou)?r?s?\b/i);
              const m = t.match(/(\d+)\s*m(?:in)?s?\b/i);
              const s = t.match(/(\d+)\s*s(?:ec)?s?\b/i);
              if (h||m||s) return (+(h?h[1]:0))*3600 + (+(m?m[1]:0))*60 + (+(s?s[1]:0));
              return -1;
            }).catch(()=>-1);
          }

          async function doExtend(page, browser) {
            console.log('=== TIMER EXTEND ===');
            await page.goto(TIMER_URL, { waitUntil:'domcontentloaded', timeout:30000 }).catch(()=>{});
            await sleep(3000);
            await shot(page, 'timer_01_loaded').catch(()=>{});

            const tc = await clickTurnstile(page);
            if (tc) {
              const ok = await waitTurnstile(page);
              console.log(ok ? 'turnstile ok' : 'turnstile unconfirmed');
            }
            await shot(page, 'timer_02_turnstile').catch(()=>{});
            await sleep(2000);

            const tp = await btnPos(page, 'add time') || await btnPos(page, '添加时间');
            if (!tp) {
              console.log('no extend button found');
              await shot(page, 'timer_03_no_btn').catch(()=>{});
              return 'no_btn';
            }
            console.log('click add time @ ' + (tp.x|0) + ',' + (tp.y|0));
            await cdpClick(page, tp.x, tp.y);
            await sleep(3000);
            await shot(page, 'timer_03_addtime').catch(()=>{});

            const wp = await btnPos(page, 'watch ad') || await btnPos(page, '观看广告');
            if (!wp) {
              console.log('no watch ad button found');
              await shot(page, 'timer_04_no_ad').catch(()=>{});
              return 'no_ad_btn';
            }
            console.log('click watch ad @ ' + (wp.x|0) + ',' + (wp.y|0));

            let alreadyExt = false;
            const urlBefore = page.url();
            const countBefore = (await browser.pages().catch(()=>[])).length;
            await cdpClick(page, wp.x, wp.y);
            await sleep(4000);

            const urlAfter = page.url();
            const pagesNow = await browser.pages().catch(()=>[]);

            if (urlAfter !== urlBefore && !urlAfter.includes('timer?id=')) {
              console.log('ad navigated current page to: ' + urlAfter.substring(0,80));
              const adDeadline = Date.now() + 55000;
              while (Date.now() < adDeadline) {
                await sleep(2000);
                try {
                  const cur = page.url();
                  if (cur.includes('timer?id=')) { console.log('back on timer page'); break; }
                  const txt = await page.evaluate(() => document.body.innerText.substring(0,200)).catch(()=>'');
                  if (txt.includes('Timer has been extended') || txt.includes('extended')) {
                    console.log('timer extended during ad wait');
                    alreadyExt = true;
                    break;
                  }
                } catch(e) { console.log('page nav error, will goto timer'); break; }
              }
            } else if (pagesNow.length > countBefore) {
              const adPage = pagesNow[pagesNow.length - 1];
              console.log('ad opened new tab: ' + (await adPage.url().catch(()=>'?')));
              const adDeadline = Date.now() + 55000;
              while (Date.now() < adDeadline) {
                await sleep(3000);
                const curPages = await browser.pages().catch(()=>[]);
                if (!curPages.includes(adPage)) { console.log('ad tab closed'); break; }
                try {
                  const txt = await page.evaluate(() => document.body.innerText.substring(0,200)).catch(()=>'');
                  if (txt.includes('Timer has been extended') || txt.includes('extended')) {
                    console.log('timer extended during ad wait');
                    alreadyExt = true;
                    break;
                  }
                } catch(e) {}
              }
              try { await adPage.close(); } catch(e) {}
            } else {
              console.log('ad no navigation detected, waiting 50s...');
              const adDeadline = Date.now() + 50000;
              while (Date.now() < adDeadline) {
                await sleep(3000);
                try {
                  const txt = await page.evaluate(() => document.body.innerText.substring(0,200)).catch(()=>'');
                  if (txt.includes('Timer has been extended') || txt.includes('extended')) {
                    console.log('timer extended during ad wait');
                    alreadyExt = true;
                    break;
                  }
                  if (txt.includes('add time') || txt.includes('添加时间')) {
                    console.log('back on timer page during ad wait');
                    break;
                  }
                } catch(e) {}
              }
              for (const sel of ['.close','.dismiss','.skip','button[aria-label*=\"close\"]','[class*=\"close\"]','[class*=\"dismiss\"]']) {
                const el = await page.$(sel).catch(()=>null);
                if (el) { try { await el.click(); console.log('dismissed: ' + sel); await sleep(1000); } catch(e) {} }
              }
            }
            try { await page.bringToFront(); } catch(e) {}

            if (alreadyExt) {
              console.log('timer extended ok (detected during ad wait)');
              await shot(page, 'timer_07_result').catch(()=>{});
              return 'ok';
            }

            console.log('reloading timer page...');
            await page.goto(TIMER_URL, { timeout:15000 }).catch(async ()=>{
              console.log('first goto failed, retrying once...');
              await sleep(3000);
              await page.goto(TIMER_URL, { timeout:15000 }).catch(()=>{});
            });
            await sleep(5000);

            const tc2 = await clickTurnstile(page);
            if (tc2) { await waitTurnstile(page); }
            await sleep(2000);

            const tp2 = await btnPos(page, 'add time') || await btnPos(page, '添加时间');
            if (tp2) {
              console.log('click add time again @ ' + (tp2.x|0) + ',' + (tp2.y|0));
              await cdpClick(page, tp2.x, tp2.y);
              await sleep(3000);
              await shot(page, 'timer_06_after_add').catch(()=>{});
            }

            const extended = await page.evaluate(() =>
              document.body.innerText.includes('Timer has been extended') ||
              document.body.innerText.includes('计时器已') ||
              document.body.innerText.includes('extended')
            ).catch(()=>false);
            await shot(page, 'timer_07_result').catch(()=>{});
            if (extended) {
              console.log('timer extended ok');
              return 'ok';
            }
            console.log('extend unconfirmed');
            return 'unconfirmed';
          }
          async function doStart(page) {
            for (let round = 1; round <= 3; round++) {
              console.log('--- round ' + round + '/3 ---');
              const sp = await btnPos(page, 'start');
              if (!sp) { console.log('no start btn'); break; }
              console.log('click Start @ ' + (sp.x|0) + ',' + (sp.y|0));
              await cdpClick(page, sp.x, sp.y);

              let adClicked = false;
              for (let w = 0; w < 10; w++) {
                await sleep(500);
                const ap = await btnPos(page, 'watch ad');
                if (ap) {
                  await sleep(1000);
                  const ap2 = await btnPos(page, 'watch ad');
                  if (ap2) {
                    await shot(page, 'ad_' + round);
                    console.log('click Watch Ad @ ' + (ap2.x|0) + ',' + (ap2.y|0));
                    await cdpClick(page, ap2.x, ap2.y);
                    adClicked = true;
                  }
                  break;
                }
              }
              if (!adClicked) console.log('no ad modal');

              console.log('waiting 30s...');
              for (let s = 5; s <= 30; s += 5) { await sleep(5000); console.log(s + '/30s'); }

              await page.reload({ waitUntil: 'domcontentloaded' });
              await sleep(2000);
              const st = await getStatus(page);
              console.log('status: ' + st);
              await shot(page, 'round' + round + '_' + st);
              if (st === 'starting' || st === 'online') return st;
              if (round < 3) await sleep(2000);
            }
            return await getStatus(page);
          }

          const { browser, page } = await connect({
            headless: false, turnstile: false, disableXvfb: false,
            args: ['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage','--disable-gpu','--window-size=1280,800'],
            customConfig: { chromePath: '/usr/bin/google-chrome-stable' },
            connectOption: { defaultViewport: { width:1280, height:800 }, protocolTimeout: 120000 },
          });
          console.log('browser ok');

          try {
            await page.goto(LOGIN_URL, { waitUntil:'domcontentloaded', timeout:30000 });
            await sleep(2000);
            await shot(page, '01_login');

            await page.focus('input[type="email"]'); await sleep(200);
            for (const c of EMAIL) { await page.keyboard.type(c, { delay: 40+Math.random()*40 }); }
            await sleep(300);
            await page.focus('input[type="password"]'); await sleep(200);
            for (const c of PASSWORD) { await page.keyboard.type(c, { delay: 40+Math.random()*40 }); }
            await sleep(300);
            await shot(page, '02_creds');

            const tc = await clickTurnstile(page);
            if (tc) { const ok = await waitTurnstile(page); console.log(ok?'turnstile ok':'turnstile unconfirmed'); }
            else console.log('no turnstile found');
            await shot(page, '03_turnstile');

            const lp = await btnPos(page, 'sign in');
            if (lp) await cdpClick(page, lp.x, lp.y);
            else await page.keyboard.press('Enter');

            try { await page.waitForNavigation({ timeout:20000, waitUntil:'domcontentloaded' }); } catch { await sleep(5000); }
            await shot(page, '04_after_login');

            if (page.url().includes('/auth/login')) {
              const err = await page.evaluate(()=>[...document.querySelectorAll('.alert,.error,[role="alert"]')].map(e=>e.textContent?.trim()).join('|')).catch(()=>'');
              console.log('login failed: ' + err);
              await tg('❌ <b>Falix</b> 登录失败: ' + err);
              process.exit(1);
            }
            console.log('login ok');

            await page.goto(SERVER_URL, { waitUntil:'domcontentloaded', timeout:30000 });
            await sleep(3000);
            await shot(page, '05_console');

            const st = await getStatus(page);
            console.log('status: ' + st);

            if (st === 'starting' || st === 'online') {
              await tg('✅ <b>Falix</b> 状态 <code>' + st + '</code>，无需操作');
              console.log('already running');
            } else {
              const final = await doStart(page);
              if (final === 'starting' || final === 'online') {
                await tg('✅ <b>Falix</b> 启动成功，状态: <code>' + final + '</code>');
                console.log('start success');
              } else {
                await tg('⚠️ <b>Falix</b> 三次后仍为 <code>' + final + '</code>');
                console.log('still: ' + final);
              }
            }

            const timeBefore = await getRemainingTime(page);
            console.log('time before extend: ' + timeBefore + 's');

            const ext = await doExtend(page, browser);

            if (ext === 'ok') {
              await sleep(2000);
              const timeAfter = await getRemainingTime(page);
              console.log('time after extend: ' + timeAfter + 's');
              if (timeAfter >= 3500 && timeAfter <= 3700 && timeBefore > 0) {
                const gain = timeAfter - timeBefore;
                await tg('✅ <b>Falix</b> 计时器已续期: ' + timeBefore + 's → ' + timeAfter + 's (+' + gain + 's)');
                console.log('timer extend success (verified)');
              } else if (timeAfter >= 3500 && timeAfter <= 3700) {
                await tg('✅ <b>Falix</b> 计时器已续期: ~3600s');
                console.log('timer extend success');
              } else if (timeAfter > timeBefore && timeBefore > 0 && timeAfter > 0) {
                await tg('⚠️ <b>Falix</b> 续期返回 ok 但时间异常: ' + timeBefore + 's → ' + timeAfter + 's');
                console.log('timer extend unusual: ' + timeBefore + ' -> ' + timeAfter);
              } else {
                await tg('✅ <b>Falix</b> 计时器已续期（无法验证时间）');
                console.log('timer extend success (unverified)');
              }
            } else {
              await tg('⚠️ <b>Falix</b> 计时器续期失败: <code>' + ext + '</code>');
              console.log('timer extend failed: ' + ext);
            }
          } catch(e) {
            console.error('error: ' + e.message);
            await shot(page, 'error').catch(()=>{});
            await tg('❌ <b>Falix</b> 出错: ' + e.message);
            process.exit(1);
          } finally {
            await browser.close().catch(()=>{});
          }
          """
          import os
          # 写到当前工作目录（和 node_modules 同一目录）
          cwd = os.environ.get('GITHUB_WORKSPACE', os.getcwd())
          path = os.path.join(cwd, 'run.mjs')
          with open(path, 'w') as f:
              f.write(script.strip())
          print('written to: ' + path)
          PYEOF

      - name: Run script
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
          FALIX_SERVER_ID: ${{ secrets.FALIX_SERVER_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node run.mjs

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: /tmp/ss/
          retention-days: 3
